<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randevu Al | Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --accent: #6366f1; /* Bu renk admin panelinden gelecek */
  --font: 'Plus Jakarta Sans', sans-serif;
  --radius: 20px;
}
[data-theme="light"] { --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --border: #e2e8f0; --text-muted: #64748b; }
[data-theme="dark"] { --bg: #020617; --surface: #0f172a; --text: #f8fafc; --border: #1e293b; --text-muted: #94a3b8; }

body { background: var(--bg); color: var(--text); font-family: var(--font); margin: 0; padding-bottom: 50px; }

/* HEADER & BANNER */
.hero-banner {
    position: relative; height: 260px; background: #1e293b; 
    background-size: cover; background-position: center;
    display: flex; align-items: flex-end; padding: 20px;
}
.hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
}
.hero-content { position: relative; z-index: 2; display: flex; align-items: center; gap: 15px; width: 100%; max-width: 600px; margin: 0 auto; }
.biz-logo-lg { 
    width: 80px; height: 80px; border-radius: 20px; border: 4px solid var(--surface); 
    background: #fff; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.biz-info-text h1 { color: #fff; font-size: 1.5rem; font-weight: 800; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.biz-badge { background: var(--accent); color: #fff; font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; font-weight: 700; }

/* STEPPER */
.wrap { max-width: 600px; margin: -30px auto 0; position: relative; z-index: 10; padding: 0 15px; }
.steps-nav { 
    background: var(--surface); border-radius: var(--radius); padding: 15px; 
    display: flex; justify-content: space-between; border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px;
}
.s-dot { width: 35px; height: 35px; border-radius: 12px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: var(--text-muted); transition: 0.3s; }
.s-dot.active { background: var(--accent); color: #fff; transform: scale(1.1); box-shadow: 0 5px 15px rgba(var(--accent), 0.3); }
.s-dot.done { background: #10b981; color: #fff; }

/* MODERN CARDS */
.selection-grid { display: grid; gap: 12px; }
.m-card { 
    background: var(--surface); border: 2px solid var(--border); border-radius: 16px; 
    padding: 15px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px;
}
.m-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.m-card.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }

.m-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: var(--bg); }
.m-info h3 { font-size: 1rem; margin: 0 0 4px; font-weight: 700; }
.m-info p { font-size: 0.8rem; color: var(--text-muted); margin: 0; }

/* BUTTONS */
.btn-primary { 
    background: var(--accent); color: #fff; border: none; padding: 16px; 
    border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer;
    font-size: 1rem; margin-top: 15px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* TIME GRID */
.time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
.t-btn { 
    padding: 12px; border: 2px solid var(--border); border-radius: 12px; 
    text-align: center; font-weight: 700; cursor: pointer; background: var(--surface);
}
.t-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
.t-btn.taken { opacity: 0.3; pointer-events: none; background: var(--bg); }

/* LOADER */
#loader { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="loader">🚀 Yükleniyor...</div>

<div id="app" style="display:none">
    <div class="hero-banner" id="hero-banner">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <img id="biz-logo" class="biz-logo-lg" src="" alt="Logo">
            <div class="biz-info-text">
                <span class="biz-badge">Özel Randevu</span>
                <h1 id="biz-name">Yükleniyor...</h1>
            </div>
        </div>
    </div>

    <div class="wrap">
        <div class="steps-nav">
            <div class="s-dot active" id="sd1">1</div>
            <div class="s-dot" id="sd2">2</div>
            <div class="s-dot" id="sd3">3</div>
            <div class="s-dot" id="sd4">4</div>
        </div>

        <div id="step1">
            <h2 style="margin-bottom:15px">Hizmet Seçin</h2>
            <div class="selection-grid" id="svc-list"></div>
            <button class="btn-primary" onclick="nextStep(2)" id="btn1" disabled>Devam Et</button>
        </div>

        <div id="step2" style="display:none">
            <h2 style="margin-bottom:15px">Personel Seçin</h2>
            <div class="selection-grid" id="staff-list"></div>
            <button class="btn-primary" onclick="nextStep(3)" id="btn2" disabled>Zaman Seçimine Geç</button>
        </div>

        <div id="step3" style="display:none">
            <h2 style="margin-bottom:15px">Tarih ve Saat</h2>
            <input type="date" id="date-input" style="width:100%; padding:15px; border-radius:12px; border:2px solid var(--border); font-family:inherit" onchange="loadTimes()">
            <div class="time-grid" id="time-list"></div>
            <button class="btn-primary" onclick="nextStep(4)" id="btn3" disabled>Bilgilerimi Gir</button>
        </div>

        <div id="step4" style="display:none">
            <h2 style="margin-bottom:15px">Son Bir Adım</h2>
            <div style="display:grid; gap:10px">
                <input type="text" id="cust-name" placeholder="Adınız Soyadınız" style="padding:15px; border-radius:12px; border:2px solid var(--border)">
                <input type="tel" id="cust-phone" placeholder="Telefon Numaranız" style="padding:15px; border-radius:12px; border:2px solid var(--border)">
                <textarea id="cust-note" placeholder="Notunuz (Opsiyonel)" style="padding:15px; border-radius:12px; border:2px solid var(--border); height:100px"></textarea>
            </div>
            <button class="btn-primary" onclick="completeBooking()">Randevuyu Tamamla 🎉</button>
        </div>
    </div>
</div>

<script>
// SUPABASE BAĞLANTISI (Senin Bilgilerin)
const SB_URL='https://sqjlqoznuxuwybgygoqy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxamxxb3pudXh1d3liZ3lnb3F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjU3OTUsImV4cCI6MjA4OTI0MTc5NX0.raU-m-id4dj1y_962sTvb2nlXJBdLyfZ9MBzPb3IY2Q';
const sb=supabase.createClient(SB_URL,SB_KEY);

let profile, services, staff, selSvc, selStaff, selDate, selTime;

async function init() {
    const pid = new URLSearchParams(window.location.search).get('id');
    if(!pid) return alert("Hatalı Link!");

    const {data:p} = await sb.from('profiles').select('*').eq('id', pid).single();
    const {data:s} = await sb.from('services').select('*').eq('profile_id', pid).eq('is_active', true);
    const {data:st} = await sb.from('staff').select('*').eq('profile_id', pid);

    profile = p; services = s; staff = st;

    // Görsel Ayarları
    document.getElementById('biz-name').innerText = p.business_name;
    document.getElementById('biz-logo').src = p.logo_url || 'https://via.placeholder.com/100';
    // Banner görseli (Admin panelinden banner_url sütunu ekleyebilirsin, yoksa logo kullanılır)
    document.getElementById('hero-banner').style.backgroundImage = `url('${p.banner_url || p.logo_url}')`;
    
    // Temayı Renklendir
    if(p.theme_color) document.documentElement.style.setProperty('--accent', p.theme_color);

    renderServices();
    renderStaff();
    
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';
}

function renderServices() {
    const list = document.getElementById('svc-list');
    list.innerHTML = services.map(s => `
        <div class="m-card" onclick="selectSvc('${s.id}')" id="svc-${s.id}">
            <div class="m-img" style="display:flex; align-items:center; justify-content:center; background:#f0f0f0">${s.icon || '✂️'}</div>
            <div class="m-info"><h3>${s.name}</h3><p>${s.duration} dk • ₺${s.price}</p></div>
        </div>
    `).join('');
}

function selectSvc(id) {
    selSvc = services.find(x => x.id === id);
    document.querySelectorAll('#svc-list .m-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('svc-'+id).classList.add('selected');
    document.getElementById('btn1').disabled = false;
}

function renderStaff() {
    const list = document.getElementById('staff-list');
    list.innerHTML = staff.map(s => `
        <div class="m-card" onclick="selectStaff('${s.id}')" id="staff-${s.id}">
            <img src="${s.image_url || 'https://via.placeholder.com/100'}" class="m-img">
            <div class="m-info"><h3>${s.name}</h3><p>${s.title || 'Uzman'}</p></div>
        </div>
    `).join('');
}

function selectStaff(id) {
    selStaff = staff.find(x => x.id === id);
    document.querySelectorAll('#staff-list .m-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('staff-'+id).classList.add('selected');
    document.getElementById('btn2').disabled = false;
}

async function loadTimes() {
    selDate = document.getElementById('date-input').value;
    const list = document.getElementById('time-list');
    
    const {data:booked} = await sb.from('appointments')
        .select('appointment_time')
        .eq('appointment_date', selDate)
        .eq('staff_id', selStaff.id)
        .neq('status', 'cancelled');

    const taken = (booked||[]).map(b => b.appointment_time.slice(0,5));
    const hours = ["09:00","10:00","11:00","12:00","14:00","15:00","16:00","17:00"];

    list.innerHTML = hours.map(h => `
        <div class="t-btn ${taken.includes(h)?'taken':''}" onclick="selectTime('${h}')" id="t-${h.replace(':','')}">${h}</div>
    `).join('');
}

function selectTime(h) {
    selTime = h;
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('t-'+h.replace(':','')).classList.add('selected');
    document.getElementById('btn3').disabled = false;
}

function nextStep(n) {
    [1,2,3,4].forEach(s => document.getElementById('step'+s).style.display = 'none');
    document.getElementById('step'+n).style.display = 'block';
    document.querySelectorAll('.s-dot').forEach((d, i) => {
        if(i+1 < n) d.className = 's-dot done';
        else if(i+1 === n) d.className = 's-dot active';
        else d.className = 's-dot';
    });
}

async function completeBooking() {
    const name = document.getElementById('cust-name').value;
    const phone = document.getElementById('cust-phone').value;
    if(!name || !phone) return alert("Bilgileri doldurun!");

    const {error} = await sb.from('appointments').insert({
        profile_id: profile.id,
        service_id: selSvc.id,
        staff_id: selStaff.id,
        customer_name: name,
        customer_phone: phone,
        appointment_date: selDate,
        appointment_time: selTime,
        status: 'pending',
        notes: document.getElementById('cust-note').value
    });

    if(!error) {
        alert("Randevu Başarıyla Alındı! 🎉");
        location.reload();
    } else {
        alert("Hata: " + error.message);
    }
}

init();
</script>
</body>
</html>
